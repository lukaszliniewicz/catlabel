name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.platform_name }} ${{ matrix.arch_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
          - runner: ubuntu-22.04-arm
            platform_name: Linux
            arch_name: arm64
          - runner: windows-latest
            platform_name: Windows
            arch_name: x86_64
          - runner: macos-15
            platform_name: macOS
            arch_name: arm64
          - runner: macos-15-intel
            platform_name: macOS
            arch_name: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install python-lzo system dependencies on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y liblzo2-dev

      - name: Install python-lzo system dependencies on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: brew install lzo

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            lzo_prefix="$(brew --prefix lzo)"
            export CFLAGS="-I${lzo_prefix}/include ${CFLAGS:-}"
            export CPPFLAGS="-I${lzo_prefix}/include ${CPPFLAGS:-}"
            export LDFLAGS="-L${lzo_prefix}/lib ${LDFLAGS:-}"
            export PKG_CONFIG_PATH="${lzo_prefix}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: python -m unittest discover -s tests -p 'test_*.py'
