name: Release Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  create_release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.5.0
        with:
          generate_release_notes: true

  test:
    name: Test ${{ matrix.platform_name }} ${{ matrix.arch_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
          - runner: ubuntu-22.04-arm
            platform_name: Linux
            arch_name: arm64
          - runner: windows-latest
            platform_name: Windows
            arch_name: x86_64
          - runner: macos-15
            platform_name: macOS
            arch_name: arm64
          - runner: macos-15-intel
            platform_name: macOS
            arch_name: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare platform system dependencies
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y liblzo2-dev
              ;;
            macOS)
              brew list lzo >/dev/null 2>&1 || brew install lzo
              ;;
          esac

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            lzo_prefix="$(brew --prefix lzo)"
            export CFLAGS="-I${lzo_prefix}/include ${CFLAGS:-}"
            export CPPFLAGS="-I${lzo_prefix}/include ${CPPFLAGS:-}"
            export LDFLAGS="-L${lzo_prefix}/lib ${LDFLAGS:-}"
            export PKG_CONFIG_PATH="${lzo_prefix}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: python -m unittest discover -s tests -p 'test_*.py'

  build_cli:
    name: Build CLI ${{ matrix.platform_name }} ${{ matrix.arch_name }}
    needs:
      - create_release
      - test
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.create_release.result == 'success' || needs.create_release.result == 'skipped')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
          - runner: ubuntu-22.04-arm
            platform_name: Linux
            arch_name: arm64
          - runner: windows-latest
            platform_name: Windows
            arch_name: x86_64
          - runner: macos-15
            platform_name: macOS
            arch_name: arm64
          - runner: macos-15-intel
            platform_name: macOS
            arch_name: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare platform build environment
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              # Build Linux artifacts on the distro Python because GitHub's
              # setup-python runtime can produce frozen binaries without usable
              # RFCOMM socket support.
              sudo apt-get update
              sudo apt-get install -y python3 python3-pip python3-venv python3-dev liblzo2-dev
              python3 -m venv .venv
              echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
              ;;
            macOS)
              brew list lzo >/dev/null 2>&1 || brew install lzo
              ;;
          esac

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            lzo_prefix="$(brew --prefix lzo)"
            export CFLAGS="-I${lzo_prefix}/include ${CFLAGS:-}"
            export CPPFLAGS="-I${lzo_prefix}/include ${CPPFLAGS:-}"
            export LDFLAGS="-L${lzo_prefix}/lib ${LDFLAGS:-}"
            export PKG_CONFIG_PATH="${lzo_prefix}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller>=6.0,<7"

      - name: Resolve artifact metadata
        id: meta
        shell: bash
        run: |
          arch="$RUNNER_ARCH"
          case "$arch" in
            X64) arch="x86_64" ;;
            ARM64) arch="arm64" ;;
            *) arch="$(echo "$arch" | tr '[:upper:]' '[:lower:]')" ;;
          esac
          artifact_name="TiMini-Print-Command-Line-${{ matrix.platform_name }}-$arch"
          echo "arch=$arch" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build command-line executable
        shell: bash
        run: |
          extra_args=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            extra_args="$extra_args --hidden-import objc --hidden-import IOBluetooth --hidden-import Foundation --hidden-import CoreBluetooth"
          fi

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --paths . \
            --distpath dist \
            --workpath build/command-line \
            --specpath build/spec \
            --collect-data timiniprint \
            --collect-all bleak \
            --collect-all dbus_fast \
            --collect-all pypdfium2 \
            --collect-all pypdfium2_raw \
            --name "${{ steps.meta.outputs.artifact_name }}" \
            $extra_args \
            timiniprint_command_line.py

      - name: Resolve built artifact path
        id: built
        shell: bash
        run: |
          target="dist/${{ steps.meta.outputs.artifact_name }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            target="${target}.exe"
          elif [ -d "${target}.app" ]; then
            target="${target}.app"
          fi
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.built.outputs.path }}

      - name: Upload files to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: ${{ steps.built.outputs.path }}

  build_gui:
    name: Build GUI ${{ matrix.platform_name }} ${{ matrix.arch_name }}
    needs:
      - create_release
      - test
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.create_release.result == 'success' || needs.create_release.result == 'skipped')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform_name: Linux
            arch_name: x86_64
          - runner: ubuntu-22.04-arm
            platform_name: Linux
            arch_name: arm64
          - runner: windows-latest
            platform_name: Windows
            arch_name: x86_64
          - runner: macos-15
            platform_name: macOS
            arch_name: arm64
          - runner: macos-15-intel
            platform_name: macOS
            arch_name: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        if: runner.os != 'Linux'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Prepare platform build environment
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              # Build Linux artifacts on the distro Python because GitHub's
              # setup-python runtime can produce frozen binaries without usable
              # RFCOMM socket support.
              sudo apt-get update
              sudo apt-get install -y python3 python3-pip python3-venv python3-dev python3-tk liblzo2-dev
              python3 -m venv .venv
              echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
              ;;
            macOS)
              brew list lzo >/dev/null 2>&1 || brew install lzo
              ;;
          esac

      - name: Install dependencies
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            lzo_prefix="$(brew --prefix lzo)"
            export CFLAGS="-I${lzo_prefix}/include ${CFLAGS:-}"
            export CPPFLAGS="-I${lzo_prefix}/include ${CPPFLAGS:-}"
            export LDFLAGS="-L${lzo_prefix}/lib ${LDFLAGS:-}"
            export PKG_CONFIG_PATH="${lzo_prefix}/lib/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
          fi
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt "pyinstaller>=6.0,<7"

      - name: Verify tkinter for GUI build
        shell: bash
        run: python -c "import tkinter"

      - name: Resolve artifact metadata
        id: meta
        shell: bash
        run: |
          arch="$RUNNER_ARCH"
          case "$arch" in
            X64) arch="x86_64" ;;
            ARM64) arch="arm64" ;;
            *) arch="$(echo "$arch" | tr '[:upper:]' '[:lower:]')" ;;
          esac
          artifact_name="TiMini-Print-GUI-${{ matrix.platform_name }}-$arch"
          echo "arch=$arch" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build graphical executable
        shell: bash
        run: |
          extra_args=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            extra_args="$extra_args --hidden-import objc --hidden-import IOBluetooth --hidden-import Foundation --hidden-import CoreBluetooth"
          fi

          python -m PyInstaller \
            --noconfirm \
            --clean \
            --onefile \
            --windowed \
            --paths . \
            --distpath dist \
            --workpath build/graphical \
            --specpath build/spec \
            --collect-data timiniprint \
            --collect-all bleak \
            --collect-all dbus_fast \
            --collect-all pypdfium2 \
            --collect-all pypdfium2_raw \
            --name "${{ steps.meta.outputs.artifact_name }}" \
            $extra_args \
            timiniprint_gui.py

      - name: Resolve built artifact path
        id: built
        shell: bash
        run: |
          target="dist/${{ steps.meta.outputs.artifact_name }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            target="${target}.exe"
          elif [ -d "${target}.app" ]; then
            target="${target}.app"
          fi
          echo "path=$target" >> "$GITHUB_OUTPUT"

      - name: Package macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          ARTIFACT_NAME: ${{ steps.meta.outputs.artifact_name }}
          TARGET_PATH: ${{ steps.built.outputs.path }}
        run: |
          if [ ! -d "$TARGET_PATH" ]; then
            echo "Expected macOS GUI bundle at $TARGET_PATH"
            exit 1
          fi
          ditto -c -k --keepParent "$TARGET_PATH" "dist/${ARTIFACT_NAME}.zip"

      - name: Resolve upload path
        id: upload
        shell: bash
        run: |
          path="${{ steps.built.outputs.path }}"
          if [ "${{ runner.os }}" = "macOS" ]; then
            path="dist/${{ steps.meta.outputs.artifact_name }}.zip"
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.upload.outputs.path }}

      - name: Upload files to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: ${{ steps.upload.outputs.path }}
